

<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2027">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Clock Dashboard</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/clock-dashboard/favicon.png?v=1">
  <link rel="shortcut icon" href="/clock-dashboard/favicon.png?v=1">
  <link rel="apple-touch-icon" href="/clock-dashboard/favicon.png">

  <!-- manifest -->
  <link rel="manifest" href="/clock-dashboard/manifest.json">

  <!-- font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
/* ===== CSS ===== */

@keyframes shift {
  0% { transform: translate(0,0); }
  100% { transform: translate(1px,1px); }
}

body {
  text-align: center;
  margin: 0;

  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  font-family: 'Orbitron', sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;

  animation: shift 120s infinite alternate; /* 🔥 放慢 */ /* d135d43a6d400318bde5b7fc1c4fef8b */
}

.card {
  width: min(80vw, 900px);
  height: min(35vh, 350px);
  aspect-ratio: 3 / 1;

  font-size: clamp(16px, 4vw, 40px);
  padding: clamp(20px, 4vw, 60px);
  box-sizing: border-box;

  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center; /* 🔥 修正 */
  overflow: hidden;
}

#time {
  font-size: 2.5em;
  font-weight: 700;
  letter-spacing: 2px;

  width: 100%;
  max-width: 95%;
  text-align: center;

  overflow: hidden;
  text-overflow: ellipsis;

  text-shadow: 0 0 8px rgba(255,255,255,0.25);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

#date {
  font-size: 0.4em;
  margin-top: 10px;
  opacity: 0.7;

  width: 100%;
  max-width: 80%;
  text-align: center;
}

#weather {
  margin-top: 20px;
  font-size: 0.45em;
  opacity: 0.85;

  width: 100%;
  max-width: 85%;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;

  text-align: center;
}

#weather .left,
#weather .right {
  flex: 1;
  text-align: center;
}

#weather .middle {
  flex: 0;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
  </style>
</head>

<body>

<div class="card">
  <div id="time">--:--</div>
  <div id="date">Loading...</div>

  <div id="weather">
    <span class="left">📍 台北</span>
    <span class="middle">--°C</span>
    <span class="right">--</span>
  </div>
</div>

<script>
const TIMEZONES = {
  taipei: "Asia/Taipei",
  tokyo: "Asia/Tokyo",
  ny: "America/New_York"
};

let currentTimezone = TIMEZONES.taipei;

function updateTime() {
  const now = new Date();

  const time = new Intl.DateTimeFormat("zh-TW", {
    timeZone: currentTimezone,
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  }).format(now);

  const date = new Intl.DateTimeFormat("zh-TW", {
    timeZone: currentTimezone,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "long"
  }).format(now);

  document.getElementById("time").innerText = time;
  document.getElementById("date").innerText = date;
}

setInterval(updateTime, 1000);
updateTime();

// ===== 天氣 =====
const apiKey = "d135d43a6d400318bde5b7fc1c4fef8b"; // ⚠️ 請換成正確 key
const city = "Taipei,tw";

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=zh_tw`)
  .then(res => res.json())
  .then(data => {
    if (data.cod !== 200) throw new Error(data.message);

    const temp = data.main.temp;
    const desc = data.weather[0].description;

    document.querySelector("#weather .middle").innerText = `${temp}°C`;
    document.querySelector("#weather .right").innerText = desc;
  })
  .catch(() => {
    document.querySelector("#weather .middle").innerText = "--°C";
    document.querySelector("#weather .right").innerText = "錯誤";
  });
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/clock-dashboard/sw.js')
    .then(() => console.log('SW registered'));
}
document.body.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});
</script>

</body>
</html>
